name: Deploy to GitHub Pages

# Deploys Idle Legion to GitHub Pages on every push to main.
# Live UA/Magic keys are injected from repo secrets at build time — never committed.
# The idle game itself works even with no secrets set (offline-playable).

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm test --if-present
      - name: Build
        run: npm run build
        env:
          VITE_BASE: /idle-legion/
          VITE_PARTICLE_PROJECT_ID: ${{ secrets.VITE_PARTICLE_PROJECT_ID }}
          VITE_PARTICLE_CLIENT_KEY: ${{ secrets.VITE_PARTICLE_CLIENT_KEY }}
          VITE_PARTICLE_APP_ID: ${{ secrets.VITE_PARTICLE_APP_ID }}
          VITE_MAGIC_PUBLISHABLE_KEY: ${{ secrets.VITE_MAGIC_PUBLISHABLE_KEY }}
          VITE_WAR_CHEST_RECEIVER: ${{ secrets.VITE_WAR_CHEST_RECEIVER }}
          # InsForge backend. Without VITE_INSFORGE_URL the deployed site silently
          # disables cloud saves (src/lib/cloudSave.ts) and analytics
          # (src/lib/telemetry.ts) — both no-op when the base URL is empty.
          VITE_INSFORGE_URL: ${{ secrets.VITE_INSFORGE_URL }}
          VITE_INSFORGE_ANON_KEY: ${{ secrets.VITE_INSFORGE_ANON_KEY }}
          VITE_INSFORGE_FN_URL: ${{ secrets.VITE_INSFORGE_FN_URL }}
      - name: SPA fallback (Pages 404 -> index.html)
        run: cp dist/index.html dist/404.html
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
