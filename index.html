<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚔️</text></svg>" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Idle Legion — Universal Accounts Game</title>
    <!-- Self-hosted fonts: no third-party origins, no render-blocking stylesheet.
         Variable woff2 (weight 400-900) covers every weight src/App.css uses
         (--font-head: Cinzel, --font-body: DM Sans; weights 600/700/800/900).
         %BASE_URL% is substituted by Vite so this works under GitHub Pages'
         /idle-legion/ base as well as at the site root. -->
    <link rel="preload" href="%BASE_URL%fonts/dm-sans-latin.woff2" as="font" type="font/woff2" crossorigin />
    <link rel="preload" href="%BASE_URL%fonts/cinzel-latin.woff2" as="font" type="font/woff2" crossorigin />
    <style>
      @font-face {
        font-family: "Cinzel";
        font-style: normal;
        font-weight: 400 900;
        font-display: swap;
        src: url("%BASE_URL%fonts/cinzel-latin.woff2") format("woff2");
        unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;
      }
      @font-face {
        font-family: "Cinzel";
        font-style: normal;
        font-weight: 400 900;
        font-display: swap;
        src: url("%BASE_URL%fonts/cinzel-latin-ext.woff2") format("woff2");
        unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;
      }
      @font-face {
        font-family: "DM Sans";
        font-style: normal;
        font-weight: 400 900;
        font-display: swap;
        src: url("%BASE_URL%fonts/dm-sans-latin.woff2") format("woff2");
        unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;
      }
      @font-face {
        font-family: "DM Sans";
        font-style: normal;
        font-weight: 400 900;
        font-display: swap;
        src: url("%BASE_URL%fonts/dm-sans-latin-ext.woff2") format("woff2");
        unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
